<!DOCTYPE html>
<html>
<head>
    <title>Tabu Ultra</title>
    <link rel="stylesheet" href="style-game.css">
</head>
<body>
    <div id="screen-login" class="screen active">
        <input type="text" id="login-name-input">
        <div id="btn-create-room" onclick="net.create()"></div>
        <div id="btn-join-room" onclick="net.join()"></div>
    </div>

    <div id="screen-lobby" class="screen">
        <div id="slot-anlat-a" class="lobby-slot"></div>
        <div id="slot-dinle-a" class="lobby-slot"></div>
        <div id="slot-anlat-b" class="lobby-slot"></div>
        <div id="slot-dinle-b" class="lobby-slot"></div>
        
        <select id="select-time">
            <option value="60">60 Saniye</option>
            <option value="90">90 Saniye</option>
            <option value="120">120 Saniye</option>
        </select>
        
        <select id="select-theme" onchange="game.currentTheme = this.value"></select>
        <div id="btn-start" onclick="net.start()"></div>
    </div>

    <div id="screen-narrator-a" class="screen">
        <div id="word-main"></div>
        <div id="word-forbidden"></div>
    </div>
    <div id="screen-narrator-b" class="screen"></div>

    <div id="screen-listener-a" class="screen">
        <input type="text" id="guess-input" placeholder="LİDER TAHMİNİ BURAYA...">
    </div>
    <div id="screen-listener-b" class="screen"></div>

    <script src="game-engine.js"></script>
    <script>
        window.onload = () => { game.loadWords(); };
    </script>
</body>
</html>
