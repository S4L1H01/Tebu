<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style-game.css">
</head>
<body>
    <div id="app-container">
        <div id="screen-lobby" class="screen active" style="background-image: url('bg-lobby.jpg');">
            <div id="lobby-link-area">URL: Bekleniyor...</div>
            <select id="select-time">
                <option value="60">60s</option>
                <option value="90">90s</option>
            </select>
            <select id="select-theme"></select>
            <div id="btn-start-final" onclick="startGame()"></div>
            
            <div style="position:absolute; top:18%; left:10%; width:15%; height:10%;" onclick="joinRole('A', 'anlatici')"></div>
            <div style="position:absolute; top:38%; left:10%; width:15%; height:25%;" onclick="joinRole('A', 'dinleyici')"></div>
        </div>

        <div id="screen-narrator-a" class="screen" style="background-image: url('bg-narrator-a.png');">
            <div id="word-box"><div id="main-word">TELEFON</div></div>
            <div id="forbidden-box">
                <div class="forb-word">Akıllı</div>
                <div class="forb-word">Ekran</div>
                <div class="forb-word">Arama</div>
                <div class="forb-word">İnternet</div>
                <div class="forb-word">Apple</div>
            </div>
        </div>

        <div id="screen-listener-a" class="screen" style="background-image: url('bg-listener-a.png');">
            <div id="leader-input-container">
                <input type="text" id="guess-entry" placeholder="TAHMİNİNİ YAZ...">
            </div>
            <div style="position:absolute; bottom:15%; right:10%; width:20%; height:5%; border:1px solid #fff; text-align:center; cursor:pointer;" onclick="claimLeader('A')">LİDER OL</div>
        </div>
    </div>

    <script src="discord-logic.js"></script>
    <script src="game-engine.js"></script>
</body>
</html>
